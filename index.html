<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VURA SHOP | Elevated Urban Staples</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.paypal.com/sdk/js?client-id=sb&components=hosted-buttons"></script>

    <style>
        :root { --black: #0a0a0a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); padding-bottom: 50px; }
        
        /* Encabezado y Carrito */
        header { text-align: center; padding: 40px 20px; background: var(--black); color: var(--white); position: relative; }
        header h1 { font-weight: 900; letter-spacing: 10px; font-size: 2rem; }
        .cart-wrapper { margin-top: 20px; display: flex; justify-content: center; }

        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; padding: 0 20px; }
        
        .product-card { background: var(--white); padding: 20px; border-radius: 4px; border: 1px solid #eee; text-align: center; display: flex; flex-direction: column; }
        
        .vura-gallery { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 20px; }
        .vura-gallery img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
        .img-main { grid-row: span 2; height: 350px !important; }
        .img-detail { height: 170px !important; }

        .title { font-weight: 700; font-size: 1.4rem; margin-top: 10px; }
        .price { font-weight: 900; font-size: 1.8rem; margin: 10px 0; }
        .description-box { text-align: left; font-size: 0.8rem; line-height: 1.4; color: #333; margin-bottom: 20px; white-space: pre-wrap; font-family: monospace; background: #f9f9f9; padding: 15px; }
        
        .paypal-container { min-height: 100px; margin-top: auto; }
        
        footer { text-align: center; margin-top: 80px; font-size: 0.7rem; color: #bbb; letter-spacing: 3px; padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>VURA</h1>
    <div class="cart-wrapper">
        <div id="pp-view-cart"></div>
    </div>
</header>

<div class="container">

    <div class="product-card">
        <div class="vura-gallery">
            <img src="gorra_frontal.jpg" class="img-main">
            <img src="gorra_detalle.jpg" class="img-detail">
            <img src="gorra_modelo.jpg" class="img-detail">
        </div>
        <h2 class="title">VURA "Legacy" Cap</h2>
        <p class="price">24,95€</p>
        <div id="paypal-container-CAP" class="paypal-container"></div>
    </div>

    <div class="product-card">
        <div class="vura-gallery">
            <img src="identity_flo_front.jpg" class="img-main">
            <img src="identity_flo_folded.jpg" class="img-detail">
            <img src="identity_flo_model.jpg" class="img-detail">
        </div>
        <h2 class="title">VURA "Identity" - Flo Blue</h2>
        <p class="price">29,95€</p>
        <div class="description-box">VURA | ESENCIA URBANA 1717</div>
        <div id="paypal-container-V9WSNQQD4BNZG-FLO" class="paypal-container"></div>
    </div>

    <div class="product-card">
        <div class="vura-gallery">
            <img src="identity_pepper_front.jpg" class="img-main">
            <img src="identity_pepper_folded.jpg" class="img-detail">
            <img src="identity_pepper_model.jpg" class="img-detail">
        </div>
        <h2 class="title">VURA "Identity" - Pepper</h2>
        <p class="price">29,95€</p>
        <div class="description-box">VURA | ESENCIA URBANA 1717</div>
        <div id="paypal-container-V9WSNQQD4BNZG-PEPPER" class="paypal-container"></div>
    </div>

</div>

<footer>
    <p>© 2026 VURA - ELEVATED URBAN STAPLES</p>
</footer>

<script>
    // 1. RENDERIZAR EL BOTÓN DEL CARRITO
    paypal.HostedButtons({
        hostedButtonId: "V9WSNQQD4BNZG", // Usamos tu ID base para el carrito
    }).render("#pp-view-cart");

    // 2. RENDERIZAR BOTONES DE PRODUCTOS DE 29,95€ (Usando tu nuevo ID)
    const productosIdentity = ["#paypal-container-V9WSNQQD4BNZG-FLO", "#paypal-container-V9WSNQQD4BNZG-PEPPER"];
    
    productosIdentity.forEach(id => {
        paypal.HostedButtons({
            hostedButtonId: "V9WSNQQD4BNZG",
        }).render(id);
    });

    // 3. RENDERIZAR OTROS PRECIOS (Si tienes IDs diferentes para ellos, cámbialos aquí)
    // Ejemplo para la gorra (si aún no tienes ID de hosted button para ella, usará el estándar)
    paypal.HostedButtons({
        hostedButtonId: "V9WSNQQD4BNZG", // Cambiar por el ID específico de la gorra cuando lo tengas
    }).render("#paypal-container-CAP");
</script>

</body>
</html>
