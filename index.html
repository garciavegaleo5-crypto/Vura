<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VURA SHOP | Elevated Staples</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=sb"></script>

    <style>
        :root { --black: #0a0a0a; --white: #ffffff; --grey: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); padding: 40px 20px; }
        
        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-weight: 900; letter-spacing: 8px; font-size: 2rem; }

        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 40px; }
        
        .product-card { background: var(--white); padding: 25px; border-radius: 8px; border: 1px solid #eee; text-align: center; display: flex; flex-direction: column; }

        /* DISEÑO DE GALERÍA DE 3 FOTOS */
        .vura-gallery { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 25px; }
        .vura-gallery img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid #f0f0f0; }
        .img-large { grid-row: span 2; height: 350px !important; }
        .img-small { height: 170px !important; }

        .title { font-weight: 700; font-size: 1.3rem; margin-bottom: 8px; }
        .desc { color: #666; font-size: 0.95rem; margin-bottom: 15px; height: 40px; }
        .price { font-weight: 900; font-size: 1.8rem; margin-bottom: 25px; }
        
        .paypal-box { min-height: 150px; }
        
        footer { text-align: center; margin-top: 60px; font-size: 0.8rem; color: #999; letter-spacing: 2px; }

        @media (max-width: 500px) {
            .container { grid-template-columns: 1fr; }
            .img-large { height: 280px !important; }
            .img-small { height: 135px !important; }
        }
    </style>
</head>
<body>

<header>
    <h1>VURA</h1>
</header>

<div class="container">
    <div class="product-card">
        <div class="vura-gallery">
            <img src="triptico.jpg" class="img-large" alt="Vura Signature Elite">
            <img src="camisetablanca.jpg" class="img-small" alt="Vura Tee">
            <img src="manga.jpg" class="img-small" alt="Detail">
        </div>

        <h2 class="title">Vura "Elevated" Signature</h2>
        <p class="desc">Negro Onyx | Algodón Premium | Bordado en manga</p>
        <p class="price">36,99€</p>

        <div id="paypal-button-1" class="paypal-box"></div>
    </div>

    <div class="product-card">
        <div class="vura-gallery">
            <img src="modelos_jovenes.jpg" class="img-large" alt="Vura Street Edition">
            <img src="camiseta_parche_gris.jpg" class="img-small" alt="Vura Patch Tee">
            <img src="detalle_parche.jpg" class="img-small" alt="Patch Detail">
        </div>

        <h2 class="title">Vura Rectangular Stitch</h2>
        <p class="desc">Oversize Fit | Parche Rectangular Gris | Urban Edition</p>
        <p class="price">26,99€</p>

        <div id="paypal-button-2" class="paypal-box"></div>
    </div>
</div>

<footer>
    <p>© 2026 VURA - ELEVATED URBAN STAPLES</p>
</footer>

<script>
    // Botón para el producto de 36,99
    paypal.Buttons({
        createOrder: (data, actions) => {
            return actions.order.create({ purchase_units: [{ amount: { value: '36.99' } }] });
        }
    }).render('#paypal-button-1');

    // Botón para el producto de 26,99
    paypal.Buttons({
        createOrder: (data, actions) => {
            return actions.order.create({ purchase_units: [{ amount: { value: '26.99' } }] });
        }
    }).render('#paypal-button-2');
</script>

</body>
</html>
