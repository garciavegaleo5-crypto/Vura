
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VURA SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.paypal.com/sdk/js?client-id=sb"></script>

    <style>
        :root { --black: #0a0a0a; --white: #ffffff; --grey: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); }
        header { background: var(--black); color: var(--white); padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { font-weight: 900; letter-spacing: 5px; font-size: 1.5rem; }
        
        .hero { width: 100%; background: var(--black); }
        .hero img { width: 100%; height: auto; display: block; }
        .hero-text { text-align: center; padding: 50px 20px; color: var(--white); background: var(--black); }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        .product-card { background: var(--grey); padding: 25px; border-radius: 4px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #eee; }
        
        /* Imagen única del primer anuncio */
        .main-img { width: 100%; height: 450px; object-fit: cover; border-radius: 2px; margin-bottom: 20px; }

        /* Galería doble del segundo anuncio */
        .gallery { display: flex; gap: 10px; margin-bottom: 20px; }
        .gallery img { width: 50%; height: 250px; object-fit: cover; border-radius: 2px; }

        .price { font-weight: 700; font-size: 1.5rem; margin: 10px 0 20px 0; }
        .pay-container { min-height: 150px; }
        
        footer { background: var(--grey); padding: 40px; text-align: center; font-size: 0.8rem; margin-top: 50px; opacity: 0.7; }
    </style>
</head>
<body>
    <header><h1>VURA</h1></header>

    <section class="hero">
        <img src="triptico_principal.jpg" alt="Vura Collection">
        <div class="hero-text">
            <h2>ELEVATED EDITION</h2>
            <p>PREMIUM STREETWEAR | ALGODÓN PREMIUM</p>
        </div>
    </section>

    <div class="container">
        <div class="product-grid">
            
            <div class="product-card">
                <img src="triptico_principal.jpg" class="main-img" alt="Vura Signature">
                <div>
                    <h3>Vura "Elevated" Signature</h3>
                    <p>Negro Onyx | Bordado en manga</p>
                    <p class="price">36,99€</p>
                </div>
                <div id="btn-elevated" class="pay-container"></div>
            </div>

            <div class="product-card">
                <div class="gallery">
                    <img src="modelos_jovenes.jpg" alt="Modelos">
                    <img src="camiseta_rectangular.jpg" alt="Prenda">
                </div>
                <div>
                    <h3>Vura Rectangular Stitch</h3>
                    <p>Oversize | Parche Rectangular Gris</p>
                    <p class="price">26,99€</p>
                </div>
                <div id="btn-rectangular" class="pay-container"></div>
            </div>

        </div>
    </div>

    <footer><p>&copy; 2026 VURA SHOP. Elevated Urban Staples.</p></footer>

    <script>
        // Botón Anuncio 1
        paypal.Buttons({
            createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '36.99' } }] })
        }).render('#btn-elevated');

        // Botón Anuncio 2
        paypal.Buttons({
            createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '26.99' } }] })
        }).render('#btn-rectangular');
    </script>
</body>
</html>
