<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VURA SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.paypal.com/sdk/js?client-id=sb&components=hosted-buttons"></script>

    <style>
        :root { --black: #0a0a0a; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); margin: 0; padding-bottom: 50px; }
        header { text-align: center; padding: 40px 20px; background: var(--black); color: var(--white); }
        header h1 { font-weight: 900; letter-spacing: 10px; margin: 0; }
        
        /* Contenedor del Carrito Flotante */
        .cart-section { display: flex; justify-content: center; padding: 20px; background: #f4f4f4; margin-bottom: 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 20px; }
        .product-card { border: 1px solid #eee; padding: 20px; text-align: center; display: flex; flex-direction: column; }
        .price { font-weight: 900; font-size: 1.5rem; margin: 15px 0; }
        .paypal-container { min-height: 100px; }
    </style>
</head>
<body>

<header>
    <h1>VURA</h1>
</header>

<div class="cart-section">
    <div id="pp-view-cart"></div>
</div>

<div class="container">
    <div class="product-card">
        <h2>VURA Identity</h2>
        <p class="price">29,95€</p>
        <div id="paypal-container-V9WSNQQD4BNZG"></div>
    </div>
    
    </div>

<script>
  // 1. Inicializar el botón de Ver Carrito
  paypal.HostedButtons({
    hostedButtonId: "V9WSNQQD4BNZG", 
  }).render("#pp-view-cart");

  // 2. Inicializar el botón de Compra del Producto
  paypal.HostedButtons({
    hostedButtonId: "V9WSNQQD4BNZG",
  }).render("#paypal-container-V9WSNQQD4BNZG");
</script>

</body>
</html>
