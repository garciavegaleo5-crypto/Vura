<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vurashop | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-white"> <header class="border-b border-gray-100 p-6 shadow-sm sticky top-0 bg-white z-10">
        <h1 class="text-3xl font-black text-center tracking-tighter italic">VURASHOP</h1>
    </header>

    <main id="contenedor-productos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-6">
        </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAv6KBls6UXkSfX1utMVli...", // RECUERDA PONER TU CLAVE REAL
            authDomain: "vura-59339.firebaseapp.com",
            projectId: "vura-59339",
            storageBucket: "vura-59339.firebasestorage.app",
            messagingSenderId: "130512296504",
            appId: "1:130512296504:web:..." 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Función para el botón de compra
        function comprar(nombre) {
            alert("¡Has añadido " + nombre + " al carrito! 🛒");
        }

        db.collection("productos").onSnapshot((querySnapshot) => {
            const contenedor = document.getElementById("contenedor-productos");
            contenedor.innerHTML = "";

            querySnapshot.forEach((doc) => {
                const p = doc.data();
                const foto = p.imagen || "https://via.placeholder.com/400x500?text=Vura+Style";
                
                // Estructura de cada recuadro (artículo)
                contenedor.innerHTML += `
                    <div class="border border-gray-200 rounded-lg overflow-hidden flex flex-col hover:shadow-xl transition-shadow">
                        <div class="h-80 bg-gray-100">
                            <img src="${foto}" class="w-full h-full object-cover" alt="producto">
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h2 class="text-lg font-bold uppercase text-gray-900">${p.nombre}</h2>
                            <p class="text-gray-500 text-sm mt-1">Envío gratis 24h</p>
                            <div class="mt-4 flex items-center justify-between">
                                <span class="text-2xl font-black">${p.precio}€</span>
                                <button onclick="comprar('${p.nombre}')" class="bg-black text-white px-6 py-2 rounded-full text-sm font-bold active:bg-gray-700">
                                    COMPRAR
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
