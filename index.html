<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VURA SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.paypal.com/sdk/js?client-id=sb&components=hosted-buttons"></script>

    <style>
        :root { --black: #0a0a0a; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--white); margin: 0; }
        header { text-align: center; padding: 30px; background: var(--black); color: var(--white); }
        .cart-container { display: flex; justify-content: center; padding: 15px; background: #f9f9f9; border-bottom: 1px solid #ddd; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .product-card { border: 1px solid #eee; padding: 25px; text-align: center; max-width: 400px; margin: 0 auto; }
        .price { font-weight: 900; font-size: 1.8rem; margin: 20px 0; }
    </style>
</head>
<body>

<header><h1>VURA</h1></header>

<div class="cart-container">
    <div id="pp-view-cart"></div>
</div>

<div class="container">
    <div class="product-card">
        <h2>VURA Identity</h2>
        <p class="price">29,95€</p>
        
        <div id="paypal-container-V9WSNQQD4BNZG"></div>
    </div>
</div>

<script>
    // Esperamos a que el SDK cargue correctamente
    window.onload = function() {
        if (window.paypal && window.paypal.HostedButtons) {
            
            // 1. Renderizar el botón de "Ver Carrito"
            paypal.HostedButtons({
                hostedButtonId: "V9WSNQQD4BNZG",
            }).render("#pp-view-cart");

            // 2. Renderizar el botón de "Añadir al Carrito / Comprar"
            paypal.HostedButtons({
                hostedButtonId: "V9WSNQQD4BNZG",
            }).render("#paypal-container-V9WSNQQD4BNZG");
            
        } else {
            console.error("El SDK de PayPal no se cargó correctamente.");
        }
    };
</script>

</body>
</html>
